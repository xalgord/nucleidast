# NucleiDAST Configuration
# ========================

# Discord Webhook Reporting
discord:
  webhook_url: ""
  notify_on:
    - critical
    - high
    - medium
  batch_size: 10          # max findings per message batch

# Subdomain Enumeration
subdomain:
  threads: 100
  use_subfinder: true
  use_findomain: true
  use_assetfinder: true

# DNS Resolution (dnsx)
dns:
  threads: 100

# URL Enumeration
urlenum:
  use_waymore: true
  use_gau: true
  use_paramspider: true
  use_gospider: true
  python_venv: "~/venv/bin/activate"

# Nuclei Scan Profiles (run in parallel)
nuclei:
  scans:
    # Profile 1: SQL Injection DAST Scanning
    - name: "SQL Injection DAST"
      severity: "critical,high,medium"
      rate_limit: 5
      concurrency: 5
      dast: true
      dashboard: true
      tags: ""
      templates: []
      extra_args: []
      enabled: true

    # Profile 2: SMTP & Config Credential Discovery
    - name: "SMTP & Config Credentials"
      severity: "critical,high,medium"
      rate_limit: 10
      concurrency: 10
      dast: false
      dashboard: true
      tags: "smtp,mail,exposure,config"
      templates: []
      extra_args: []
      enabled: true

# General Settings
output_dir: "./output"
max_concurrent_targets: 3
verbose: false
